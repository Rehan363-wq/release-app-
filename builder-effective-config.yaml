directories:
  output: release
  buildResources: build
appId: com.gomenu.desktop
productName: GO Menu POS Billing
files:
  - filter:
      - dist/**/*
      - dist-electron/**/*
win:
  target: nsis
  icon: public/icon.png
mac:
  icon: public/icon.png
nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: GO Menu POS Billing
  deleteAppDataOnUninstall: false
publish:
  - provider: generic
    url: https://raw.githubusercontent.com/Rehan363-wq/release-app-/main/
electronVersion: 35.7.5
